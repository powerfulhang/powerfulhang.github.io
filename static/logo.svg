<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="chipBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0e17"/>
    </linearGradient>
    <filter id="glow-large" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" fill="transparent"/>

  <!-- 粗体引脚 (增强小尺寸识别度) -->
  <g fill="#00ff88">
    <rect x="150" y="32" width="36" height="80" rx="8" />
    <rect x="238" y="32" width="36" height="80" rx="8" />
    <rect x="326" y="32" width="36" height="80" rx="8" />
    
    <rect x="150" y="400" width="36" height="80" rx="8" />
    <rect x="238" y="400" width="36" height="80" rx="8" />
    <rect x="326" y="400" width="36" height="80" rx="8" />
    
    <rect x="32" y="150" width="80" height="36" rx="8" />
    <rect x="32" y="238" width="80" height="36" rx="8" />
    <rect x="32" y="326" width="80" height="36" rx="8" />
    
    <rect x="400" y="150" width="80" height="36" rx="8" />
    <rect x="400" y="238" width="80" height="36" rx="8" />
    <rect x="400" y="326" width="80" height="36" rx="8" />
  </g>

  <!-- 芯片外壳 -->
  <rect x="88" y="88" width="336" height="336" rx="40" fill="url(#chipBg)" stroke="#00ff88" stroke-width="24" filter="url(#glow-large)"/>

  <!-- </> 核心代码符号 -->
  <path d="M 196 170 L 132 256 L 196 342 M 316 170 L 380 256 L 316 342 M 284 140 L 228 372" fill="none" stroke="#00d4ff" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
</svg>